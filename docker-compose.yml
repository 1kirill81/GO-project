services:
  app:
    build: .
    container_name: mini-avito-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/mini_avito?sslmode=disable
      JWT_SECRET: dev-secret-change-me
    ports:
      - "8080:8080"

  postgres:
    image: postgres:16-alpine
    container_name: mini-avito-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mini_avito
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mini_avito"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
